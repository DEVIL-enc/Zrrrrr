
<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;padding-top:100px;">

<input type="file" id="video">
<br><br>

<button onclick="upload()">Upload</button>

<div id="progress"></div>

<script>

async function upload(){

const fd=new FormData();
fd.append("video",video.files[0]);

const res=await fetch("/api/process-video",{method:"POST",body:fd});

const data=await res.json();

check(data.jobId);

}

async function check(id){

const t=setInterval(async()=>{

const r=await fetch("/api/process-progress/"+id);
const d=await r.json();

progress.innerText=d.progress+"%";

if(d.progress==100){
clearInterval(t);
location.href="/api/process-download/"+id;
}

},2000);

}

</script>

</body>
</html>
