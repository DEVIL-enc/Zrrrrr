<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>RESIST Admin</title>
<style>
body{
font-family:Tajawal;
background:#0a0a0a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:40px
}
input,select,button{
margin:10px;
padding:10px;
border-radius:8px;
border:none
}
button{
background:#6366f1;
color:white;
cursor:pointer
}
table{
margin-top:30px;
border-collapse:collapse
}
td,th{
padding:10px 20px;
border:1px solid #333
}
</style>
</head>

<body>

<h2>لوحة إدارة الأكواد</h2>

<input id="code" placeholder="CODE">

<select id="days">
<option value="7">7 أيام</option>
<option value="30">30 يوم</option>
<option value="90">90 يوم</option>
</select>

<button onclick="create()">إنشاء كود</button>

<button onclick="load()">عرض الأكواد</button>

<table id="table"></table>

<script>

const ADMIN_KEY="RESIST_ADMIN"

async function create(){

const code=document.getElementById("code").value
const days=document.getElementById("days").value

await fetch("/admin/create-license",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-key":ADMIN_KEY
},
body:JSON.stringify({
key:code,
duration_days:Number(days)
})
})

alert("تم إنشاء الكود")
}

async function load(){

const res=await fetch("/admin/list",{
headers:{ "x-admin-key":ADMIN_KEY }
})

const data=await res.json()

let html="<tr><th>الكود</th><th>ينتهي</th></tr>"

data.forEach(l=>{
html+=`<tr><td>${l.key}</td><td>${l.expires_at||"-"}</td></tr>`
})

document.getElementById("table").innerHTML=html
}

</script>

</body>
</html>
